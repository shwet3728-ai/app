apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coffee-app
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - coffee.example.com
      secretName: coffee-app-tls
  rules:
    - host: coffee.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coffee-app
                port:
                  number: 3000
